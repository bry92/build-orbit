services:
  - type: web
    runtime: node
    name: app
    buildCommand: npm ci && npm run build:frontend && npm run build:cli
    startCommand: node scripts/migrate-and-start.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOCK_MODE
        value: "false"
      - key: APP_URL
        value: https://build-orbit-ay90.onrender.com   # ← CHANGE THIS to your actual Render URL
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Add your other secrets (Stripe, GitHub, etc.) as needed