<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>This Repo Full Production</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">
  <header class="bg-indigo-600 text-white py-6 px-6 shadow-lg">
    <div class="max-w-3xl mx-auto flex items-center gap-3">
      <span class="text-2xl" aria-hidden="true">#</span>
      <h1 class="text-2xl font-bold tracking-tight">This Repo Full Production</h1>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-10 flex flex-col gap-6">
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-4">New entry</h2>
      <div class="flex flex-col gap-3">
        <input type="text" id="field_title" placeholder="Enter title or description..." required autocomplete="off" class="flex-1 min-w-36 px-4 py-2.5 border-2 border-gray-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all">
        <label for="field_status" class="text-sm font-medium text-gray-700">Status</label>
        <select id="field_status" class="flex-1 min-w-32 px-4 py-2.5 border-2 border-gray-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all">
          <option value="active">active</option>
          <option value="pending">pending</option>
          <option value="done">done</option>
        </select>
        <button id="addBtn" class="self-start px-6 py-2.5 bg-indigo-600 hover:opacity-90 text-white font-semibold text-sm rounded-xl transition-all duration-200 hover:shadow-md active:scale-95 whitespace-nowrap">Add Entry</button>
      </div>
      <div id="formError" class="mt-2 text-red-500 text-sm" style="display:none"></div>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-4">Entries <span id="countBadge" class="inline-block bg-indigo-600 text-white text-xs font-bold rounded-full px-2 py-0.5 ml-1 align-middle">0</span></h2>
      <div id="itemList" class="flex flex-col gap-2.5"></div>
      <div id="emptyState" class="text-center py-10 text-gray-400 text-sm">
        <p>No entries yet. Add your first one above.</p>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
