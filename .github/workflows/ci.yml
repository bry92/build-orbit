name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Unit tests
        run: npm test
        env:
          NODE_ENV: test
          MOCK_MODE: 'true'
          JWT_SECRET: ci-test-jwt-secret-must-be-at-least-32-bytes
          DATABASE_URL: postgresql://localhost:5432/buildorbit_test
          OPENAI_API_KEY: sk-ci-test

      - name: Build frontend
        run: npm run build
