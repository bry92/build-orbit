<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildOrbit — Vibe Coding</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; max-width: 100%; max-height: 80vh; }
  .brand { color: #4ade80; font-size: 14px; letter-spacing: 4px; text-transform: uppercase; margin-top: 16px; opacity: 0.7; }
  .progress-bar { width: 640px; max-width: 90vw; height: 3px; background: #1a1a2e; margin-top: 16px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #4ade80; width: 0%; transition: width 0.1s; box-shadow: 0 0 8px #4ade8066; }
</style>
</head>
<body>
<canvas id="c" width="1280" height="720"></canvas>
<div class="brand">BuildOrbit — Vibe Coding</div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
const progress = document.getElementById('progress');

const DURATION = 20; // seconds
const TOTAL_FRAMES = DURATION * 60;

// Particle pool for floating code tokens
class Token {
  constructor(t) {
    this.t = t;
    this.text = pickCode();
    this.size = 12 + Math.random() * 14;
    this.speed = 0.3 + Math.random() * 0.8;
    this.angle = Math.random() * Math.PI * 2;
    this.orbitR = 80 + Math.random() * 200;
    this.orbitSpeed = (0.2 + Math.random() * 0.5) * (Math.random() > 0.5 ? 1 : -1);
    this.alpha = 0.3 + Math.random() * 0.5;
    this.color = pickGreen();
    this.phase = Math.random() * Math.PI * 2;
  }
  update(elapsed) {
    this.angle += this.orbitSpeed * 0.01;
    this.phase += 0.02;
  }
  cx() { return W/2 + Math.cos(this.angle) * this.orbitR; }
  cy() { return H/2 + Math.sin(this.angle) * this.orbitR + Math.sin(this.phase) * 30; }
}

const codeSnippets = [
  'function build() {', 'async function run() {', 'const pipeline = [];',
  'await execute(ctx);', 'const result = await', 'pipeline.push(step);',
  'ctx.on("complete",', 'module.exports =', 'const orb = new Orbit();',
  'await orb.launch();', 'const phase = next();', 'run().then(ok);',
  'if (ctx.ready) {', 'const manifest = {};', 'orbit.verify(ctx);',
  'ctx.emit("done");', 'await scaffold(manifest);', 'ctx.log("OK");',
  'export default pipeline', 'const phase = await', 'for (const step of',
  'await runPhase(id);', 'ctx.push(event);', 'pipeline.finalize();'
];

const greenColors = ['#4ade80', '#22c55e', '#86efac', '#16a34a', '#dcfce7', '#15803d'];

function pickCode() { return codeSnippets[Math.floor(Math.random() * codeSnippets.length)]; }
function pickGreen() { return greenColors[Math.floor(Math.random() * greenColors.length)]; }

const tokens = [];
for (let i = 0; i < 30; i++) {
  tokens.push(new Token(Math.random() * TOTAL_FRAMES));
}

// Orbiting code blocks
class Block {
  constructor(t) {
    this.angle = Math.random() * Math.PI * 2;
    this.radius = 100 + Math.random() * 180;
    this.speed = 0.3 + Math.random() * 0.4;
    this.lines = Math.floor(2 + Math.random() * 4);
    this.content = generateBlockContent();
    this.w = 160 + Math.random() * 100;
    this.h = this.lines * 18 + 24;
    this.alpha = 0;
    this.targetAlpha = 0.6 + Math.random() * 0.4;
    this.trail = [];
  }
  update() {
    this.angle += this.speed * 0.012;
    this.alpha = Math.min(this.alpha + 0.02, this.targetAlpha);
  }
  cx() { return W/2 + Math.cos(this.angle) * this.radius; }
  cy() { return H/2 + Math.sin(this.angle) * this.radius; }
}

function generateBlockContent() {
  const lines = Math.floor(2 + Math.random() * 4);
  const result = [];
  for (let i = 0; i < lines; i++) {
    const words = ['fn', 'async', 'await', 'ctx', 'run', 'build', 'pipe', 'task', 'step', 'emit', 'push', 'orb', 'log', 'ok', 'gate'];
    const len = 3 + Math.floor(Math.random() * 4);
    const line = [];
    for (let j = 0; j < len; j++) {
      line.push(words[Math.floor(Math.random() * words.length)]);
    }
    result.push(line.join(' '));
  }
  return result;
}

const blocks = [];
for (let i = 0; i < 6; i++) {
  const b = new Block(i * 20);
  b.angle = (i / 6) * Math.PI * 2;
  b.radius = 120 + i * 30;
  blocks.push(b);
}

// Central "vibe" orb
let orbPulse = 0;
let orbTrail = [];

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function drawStar(cx, cy, r, points, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI/2;
    const r2 = i % 2 === 0 ? r : r * 0.4;
    const x = cx + Math.cos(angle) * r2;
    const y = cy + Math.sin(angle) * r2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawGrid(elapsed) {
  ctx.strokeStyle = 'rgba(74, 222, 128, 0.04)';
  ctx.lineWidth = 1;
  const spacing = 40;
  for (let x = 0; x < W; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawCentralOrb(t) {
  const cx = W / 2, cy = H / 2;
  orbPulse += 0.03;

  // Outer glow rings
  for (let i = 4; i >= 0; i--) {
    const r = 80 + i * 25 + Math.sin(orbPulse + i * 0.5) * 10;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(74, 222, 128, ${0.05 + i * 0.01})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Central orb
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
  grad.addColorStop(0, 'rgba(74, 222, 128, 0.9)');
  grad.addColorStop(0.4, 'rgba(34, 197, 94, 0.5)');
  grad.addColorStop(1, 'rgba(34, 197, 94, 0)');
  ctx.beginPath();
  ctx.arc(cx, cy, 60 + Math.sin(orbPulse) * 8, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Orb text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ORBIT', cx, cy - 4);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '10px Courier New';
  ctx.fillText('vibe.coding()', cx, cy + 14);
}

function drawBlocks(elapsed) {
  blocks.forEach((b, i) => {
    b.update();
    const cx = b.cx(), cy = b.cy();

    // Shadow
    ctx.save();
    ctx.shadowColor = 'rgba(74, 222, 128, 0.3)';
    ctx.shadowBlur = 20;

    // Box background
    ctx.fillStyle = `rgba(10, 20, 15, ${b.alpha * 0.9})`;
    ctx.strokeStyle = `rgba(74, 222, 128, ${b.alpha})`;
    ctx.lineWidth = 1.5;
    roundRect(cx - b.w/2, cy - b.h/2, b.w, b.h, 6);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // Code lines
    ctx.save();
    ctx.globalAlpha = b.alpha;
    ctx.fillStyle = '#4ade80';
    ctx.font = '12px Courier New';
    ctx.textAlign = 'left';
    b.content.forEach((line, li) => {
      ctx.fillText(line, cx - b.w/2 + 12, cy - b.h/2 + 20 + li * 18);
    });
    ctx.restore();
  });
}

function drawTokens(elapsed) {
  tokens.forEach(token => {
    token.update(elapsed);
    const cx = token.cx(), cy = token.cy();
    ctx.save();
    ctx.globalAlpha = token.alpha;
    ctx.fillStyle = token.color;
    ctx.font = `${token.size}px Courier New`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Glow
    ctx.shadowColor = token.color;
    ctx.shadowBlur = 8;
    ctx.fillText(token.text, cx, cy);
    ctx.restore();
  });
}

function drawPhaseIndicator(t, elapsed) {
  const phases = ['Intent Gate', 'Plan', 'Scaffold', 'Code', 'Save', 'Verify'];
  const progress = (elapsed / TOTAL_FRAMES);
  const currentPhaseIdx = Math.floor(progress * phases.length) % phases.length;

  ctx.save();
  ctx.fillStyle = 'rgba(74, 222, 128, 0.9)';
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('▶  ' + phases[currentPhaseIdx], W/2, H - 40);
  ctx.restore();
}

function drawTopBar(elapsed) {
  // Title
  ctx.save();
  ctx.fillStyle = '#4ade80';
  ctx.font = 'bold 32px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('BuildOrbit', 40, 50);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '16px Courier New';
  ctx.fillText('AI Execution Pipeline', 40, 75);

  // Timer
  const secs = Math.floor((elapsed / 60) % DURATION);
  ctx.fillStyle = 'rgba(74, 222, 128, 0.6)';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText(`${secs}s / ${DURATION}s`, W - 40, 50);

  // Status
  ctx.fillStyle = '#4ade80';
  ctx.font = '12px Courier New';
  ctx.fillText('● LIVE', W - 40, 72);
  ctx.restore();
}

function drawConnectors(elapsed) {
  // Draw orbital paths
  ctx.save();
  ctx.setLineDash([5, 8]);
  ctx.strokeStyle = 'rgba(74, 222, 128, 0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 6; i++) {
    const r = 120 + i * 30;
    ctx.beginPath();
    ctx.arc(W/2, H/2, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawScanLine(elapsed) {
  const y = ((elapsed * 2) % H);
  ctx.save();
  const grad = ctx.createLinearGradient(0, y - 20, 0, y + 20);
  grad.addColorStop(0, 'rgba(74, 222, 128, 0)');
  grad.addColorStop(0.5, 'rgba(74, 222, 128, 0.08)');
  grad.addColorStop(1, 'rgba(74, 222, 128, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, y - 20, W, 40);
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

let frameCount = 0;
function animate() {
  frameCount++;
  const elapsed = frameCount;

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  drawGrid(elapsed);
  drawScanLine(elapsed);
  drawConnectors(elapsed);
  drawCentralOrb(elapsed);
  drawBlocks(elapsed);
  drawTokens(elapsed);
  drawTopBar(elapsed);
  drawPhaseIndicator(elapsed, frameCount);

  // Progress
  progress.style.width = (frameCount / TOTAL_FRAMES * 100) + '%';

  if (frameCount >= TOTAL_FRAMES) {
    frameCount = 0; // Loop
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
